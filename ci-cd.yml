name: Windscape CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Lint & Unit Tests
  # ─────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 2: Build & Containerize
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Containerize
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Stage 3a: Deploy to Staging
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    outputs:
      staging-url: ${{ vars.STAGING_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }} to staging..."
          # Replace with your actual deploy command, e.g.:
          # docker compose -f docker-compose.staging.yml up -d
          # or: kubectl set image deployment/windscape app=${{ needs.build-and-push.outputs.image-tag }}

      - name: Smoke test staging
        run: |
          echo "Running smoke test against ${{ vars.STAGING_URL }}"
          curl --fail --retry 5 --retry-delay 5 "${{ vars.STAGING_URL }}/health"

  # ─────────────────────────────────────────
  # Stage 3b: Selenium E2E Tests
  # ─────────────────────────────────────────
  selenium-e2e:
    name: Selenium E2E Tests
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Selenium dependencies
        run: |
          pip install -r tests/e2e/requirements.txt

      - name: Set up Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Selenium E2E tests
        env:
          BASE_URL: ${{ needs.deploy-staging.outputs.staging-url }}
          HEADLESS: "true"
        run: |
          pytest tests/e2e/ \
            --html=reports/e2e-report.html \
            --self-contained-html \
            --tb=short \
            -v

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-report
          path: reports/e2e-report.html
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: reports/screenshots/
          retention-days: 7

  # ─────────────────────────────────────────
  # Stage 4: Deploy to Production
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging, selenium-e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Replace with your actual deploy command, e.g.:
          # kubectl set image deployment/windscape app=${{ needs.build-and-push.outputs.image-tag }} --record
          # docker compose -f docker-compose.prod.yml up -d

      - name: Wait for rollout
        run: |
          echo "Waiting for rollout to complete..."
          sleep 15
          curl --fail --retry 10 --retry-delay 10 "${{ vars.PRODUCTION_URL }}/health"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: *Windscape* deployed to production successfully!\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Windscape* production deploy FAILED!\n*Commit:* ${{ github.sha }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
