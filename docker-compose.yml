version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: wingscape_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: wingscape_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/
      - JWT_SECRET_KEY=super-secret-key-wingscape-123
    depends_on:
      - database
    restart: always

  frontend:
    build: ./frontend
    container_name: wingscape_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
